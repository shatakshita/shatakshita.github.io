<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Lost in Deep Space | Shatakshita Shekhar</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2307080f'/><circle cx='16' cy='16' r='10' fill='none' stroke='%23a855f7' stroke-width='1' stroke-dasharray='2 1.5' opacity='.6'/><ellipse cx='16' cy='16' rx='8' ry='5' fill='none' stroke='%23c084fc' stroke-width='.8' transform='rotate(-22 16 16)' opacity='.7'/><circle cx='16' cy='16' r='2.5' fill='%23c084fc'/><circle cx='22' cy='11' r='1.2' fill='%23e879f9'/></svg>">
  <link rel="manifest" href="site.webmanifest">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080f; --fg: #eeeef5; --fg2: #9898b2; --fg3: #5a5a72;
      --c1: #a855f7; --c2: #8b5cf6; --c3: #c084fc; --c5: #e879f9;
    }
    html, body { height: 100%; }
    body {
      font-family: "Outfit", sans-serif;
      background: var(--bg); color: var(--fg);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Starfield canvas */
    #sf { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* Subtle grid */
    .grid { position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: linear-gradient(rgba(168,85,247,.018) 1px,transparent 1px),
                        linear-gradient(90deg,rgba(168,85,247,.018) 1px,transparent 1px);
      background-size: 72px 72px; }

    .content { position: relative; z-index: 10; max-width: 38rem; }

    /* Planet illustration */
    .planet-wrap { margin-bottom: 2.5rem; animation: floatY 3.5s ease-in-out infinite; }
    @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }

    .error-code {
      font-family: "Space Grotesk", sans-serif;
      font-size: .7rem; font-weight: 600; letter-spacing: .25em;
      text-transform: uppercase; color: var(--c1);
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      margin-bottom: 1.25rem;
    }
    .error-code::before, .error-code::after { content:""; display:inline-block; width:2rem; height:1px; background:var(--c1); }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2rem, 6vw, 3rem); font-weight: 700;
      line-height: 1.1; margin-bottom: 1rem;
    }
    h1 .accent {
      background: linear-gradient(135deg, #a855f7, #e879f9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .desc { font-size: .975rem; color: var(--fg2); line-height: 1.8; margin-bottom: .5rem; }
    .coords { font-size: .72rem; color: var(--fg3); font-family: "Space Grotesk", monospace;
              margin-bottom: 2.5rem; }

    .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: .875rem; }
    .btn {
      display: inline-flex; align-items: center; gap: .45rem;
      padding: .7rem 1.4rem; border-radius: .75rem; font-weight: 600;
      text-decoration: none; font-family: "Outfit", sans-serif; font-size: .875rem;
      transition: all .25s ease; border: none; white-space: nowrap;
    }
    .btn-p { background: linear-gradient(135deg, #a855f7, #c084fc); color: #07080f;
             box-shadow: 0 4px 14px rgba(168,85,247,.3); }
    .btn-p:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(168,85,247,.45); }
    .btn-s { background: transparent; border: 1.5px solid rgba(168,85,247,.35); color: #a855f7; }
    .btn-s:hover { background: rgba(168,85,247,.08); border-color: rgba(168,85,247,.7); transform: translateY(-2px); }

    /* Pulsing stars decoration */
    .star { position: fixed; border-radius: 50%; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:.7} 50%{opacity:.1} }
  </style>
</head>
<body>
  <canvas id="sf"></canvas>
  <div class="grid"></div>

  <!-- Decorative stars -->
  <div class="star" style="width:3px;height:3px;background:#a855f7;top:12%;left:8%;animation-delay:.3s"></div>
  <div class="star" style="width:2px;height:2px;background:#e879f9;top:22%;right:12%;animation-delay:.9s"></div>
  <div class="star" style="width:2.5px;height:2.5px;background:#c084fc;top:75%;left:15%;animation-delay:.6s"></div>
  <div class="star" style="width:2px;height:2px;background:#8b5cf6;top:80%;right:8%;animation-delay:1.2s"></div>
  <div class="star" style="width:3px;height:3px;background:#a855f7;top:60%;left:88%;animation-delay:.4s"></div>

  <div class="content">
    <!-- Planet SVG -->
    <div class="planet-wrap">
      <svg width="220" height="180" viewBox="0 0 220 180" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer orbit ring -->
        <ellipse cx="110" cy="90" rx="100" ry="20" fill="none" stroke="rgba(168,85,247,.18)" stroke-width="1.2" stroke-dasharray="5 3"/>
        <!-- Planet body -->
        <circle cx="110" cy="90" r="48" fill="rgba(13,15,28,.95)" stroke="#a855f7" stroke-width="1.5"/>
        <!-- Surface detail rings -->
        <circle cx="110" cy="90" r="48" fill="none" stroke="#8b5cf6" stroke-width=".6" opacity=".3"/>
        <circle cx="110" cy="90" r="36" fill="none" stroke="rgba(192,132,252,.2)" stroke-width=".8"/>
        <!-- Planet rings (tilted ellipse) -->
        <ellipse cx="110" cy="95" rx="78" ry="14" fill="none" stroke="#c084fc" stroke-width="1.2" opacity=".5" stroke-dasharray="6 4"/>
        <!-- Craters -->
        <circle cx="98"  cy="82" r="8"  fill="none" stroke="#8b5cf6" stroke-width=".8" opacity=".4"/>
        <circle cx="122" cy="98" r="5"  fill="none" stroke="#a855f7" stroke-width=".7" opacity=".35"/>
        <circle cx="108" cy="102" r="3.5" fill="none" stroke="rgba(192,132,252,.4)" stroke-width=".6"/>
        <!-- Satellite -->
        <g transform="translate(175,38)">
          <rect x="-5" y="-4" width="10" height="7" rx="1.5" fill="#111525" stroke="#a855f7" stroke-width=".9"/>
          <rect x="-12" y="-1.5" width="7" height="2.5" fill="#7c3aed" opacity=".9"/>
          <rect x="5"   y="-1.5" width="7" height="2.5" fill="#7c3aed" opacity=".9"/>
          <circle cx="0" cy="0" r="2" fill="#e879f9"/>
        </g>
        <!-- Signal -->
        <line x1="168" y1="45" x2="150" y2="70" stroke="#a855f7" stroke-width=".7" opacity=".25" stroke-dasharray="4 3"/>
        <!-- 404 text -->
        <text x="110" y="96" text-anchor="middle" dominant-baseline="middle"
          font-family="Space Grotesk,sans-serif" font-size="22" font-weight="700" fill="#c084fc" letter-spacing="-1">404</text>
      </svg>
    </div>

    <div class="error-code">Signal Lost</div>

    <h1>Lost in <span class="accent">Deep Space</span></h1>

    <p class="desc">The coordinates you entered don't match any known location in this sector of the universe.</p>
    <p class="coords" id="coords-line">Error 404 · Page not found</p>

    <div class="btn-group">
      <a href="/" class="btn btn-p">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Return to Home
      </a>
      <a href="javascript:history.back()" class="btn btn-s">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        Go Back
      </a>
    </div>
  </div>

  <script>
    // Show current path in coords line
    document.getElementById('coords-line').textContent =
      'Error 404 · Page not found · ' + window.location.pathname;

    // Starfield
    const canvas = document.getElementById('sf');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = [];
      for (let i = 0; i < 90; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.3 + 0.3,
          a: Math.random() * 0.5 + 0.15,
          y0: 0, vy: Math.random() * 0.6 + 0.2,
          col: ['rgba(168,85,247,','rgba(192,132,252,','rgba(238,238,245,'][Math.floor(Math.random()*3)]
        });
        stars[i].y0 = stars[i].y;
      }
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.y += s.vy * 0.35;
        if (s.y > canvas.height + 4) { s.y = -4; s.x = Math.random() * canvas.width; }
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.col + s.a + ')';
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    resize(); draw();
    window.addEventListener('resize', resize);
  </script>
</body>
</html>
